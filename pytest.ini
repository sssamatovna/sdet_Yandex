[pytest]
# Папка, где Pytest должен искать тесты по умолчанию
testpaths = tests

# Дефолтные флаги для запуска:
# -v: подробный вывод (verbose)
# --tb=short: укороченный и понятный вывод стектрейса при падении
# --alluredir: автоматический сбор результатов для Allure
addopts = -v --tb=short --alluredir=allure-results

# Регистрация кастомных маркеров (тегов), чтобы не было варнингов
markers =
    api: тесты для проверки REST API
    auth: тесты, проверяющие авторизацию и токены

# Настройка логирования в консоли в реальном времени (для отладки)
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S